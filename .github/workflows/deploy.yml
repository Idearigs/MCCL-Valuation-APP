name: Deploy to Coolify

on:
  push:
    branches: [ main ]

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install and build
        run: |
          npm ci
          npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: build-check
    steps:
      - name: Trigger redeploy on Coolify
        uses: fjogeleit/http-request-action@v1
        with:
          url: ${{ secrets.COOLIFY_WEBHOOK }}
          method: 'GET'
          customHeaders: '{"Authorization": "Bearer ${{ secrets.COOLIFY_TOKEN }}"}'
          timeout: 30000

      - name: Done
        run: echo "Deploy triggered on Coolify"
